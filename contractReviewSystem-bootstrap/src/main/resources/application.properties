
spring.application.name=contractReviewSystem

server.port=8080

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.serialization.write-dates-as-timestamps=false

logging.level.com.szh.contractReviewSystem=debug
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

system.name=contractReviewSystem
system.version=1.0.0
system.copyrightYear=2025
system.uploadPath=/uploads
system.avatarPath=/avatar
system.downloadPath=/download
system.addressEnabled=true
system.demoMode=false

# Redis 配置
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=5000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# ???????????
logging.file.name=logs/app.log