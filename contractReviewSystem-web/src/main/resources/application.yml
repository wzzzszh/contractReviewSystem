spring:
  application:
    name: contractReviewSystem
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/contract_review_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: sunhao88586906
  sql:
    init:
      mode: always
      encoding: UTF-8
  logging:
    file:
      name: logs/app.log

server:
  port: 8080

auth:
  jwt:
    secret: ${JWT_SECRET:contract-review-dev-secret-change-me}
    access-expiration-minutes: 30
    refresh-expiration-days: 7

logging:
  level:
    com.szh.contractReviewSystem: info
    org.mybatis: warn
    org.apache.ibatis: warn
    org.apache.pdfbox: INFO
    org.apache.fontbox: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
system:
  name: contractReviewSystem
  version: 1.0.0
  copyrightYear: 2025
  uploadPath: /uploads
  avatarPath: /avatar
  downloadPath: /download
  addressEnabled: true
  demoMode: false

file:
  lifecycle:
    cleanup-enabled: true
    temp-ttl-hours: 1
    cleanup-cron: 0 0 * * * *
    docx-agent-work-root: work/docx-agent

ark:
  apiKey: fdd9c300-621c-42e8-a6c6-c946bb956006
  baseUrl: https://ark.cn-beijing.volces.com/api/v3
  model: ep-20260331203014-58mf4
  models:
    - ep-20260331203014-58mf4
    - doubao-seed-2-0-code-preview-260215
deepseek:
  apiKey: sk-e5b36b0916ce43a9a11e1a5e76fb110e
  baseUrl: https://api.deepseek.com
  model: deepseek-v4-flash
  thinking-enabled: false
llm:
  provider: ${LLM_PROVIDER:auto}
  sticky-fallback: true
docx-agent:
  enabled: true
  baseUrl: ${ark.baseUrl}
  apiKey: ${ark.apiKey}
  model: ${ark.model}
  skillPath: C:/Users/szh/.codex/skills/docx
  legalContractRiskSkillPath: .trae/skills/legal-contract-risk
  shellWorkingDirectory: ${docx-agent.skillPath}
  pythonCommand: D:/Tools/python.exe
  temperature: 0.1
  maxCompletionTokens: 4096
  maxSequentialToolsInvocations: 12
  maxStdOutChars: 20000
  maxStdErrChars: 12000
  timeoutSeconds: 90
  patchPlanMaxAttempts: 3
  patchMinAppliedOperations: 1

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
